<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Data Entry Specialist Interview | 108 Holding Company, Inc.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" href="favicon.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      position: relative;
    }

    .logo {
      display: block;
      margin: 0 auto 20px;
      max-width: 200px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      font-size: 14px;
      color: #555;
    }

    label {
      font-weight: bold;
      margin-top: 15px;
      display: block;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    textarea {
      min-height: 80px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #0a2540;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #163d66;
    }
  </style>
</head>
<body>

<div class="container">

  <img src="assets/logo-108.png" class="logo">

  <h1>Data Entry Specialist Interview</h1>
  <p>Please complete all questions carefully.</p>

  <form action="https://formsubmit.co/info@108holdingcompanyinc.com" method="POST">

    <!-- Hidden -->
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_subject" value="New Interview Submission">
    <input type="hidden" name="_next" value="https://dataentryspecialistinterviewform.cv/thank-you.html">

    <!-- Basic Info -->
    <label>Full Name</label>
    <input type="text" name="Full Name" required>

    <label>Email Address</label>
    <input type="email" name="Email" required>

    <!-- Questions -->
    <label>1. Please introduce yourself and your experience.</label>
    <textarea name="Q1" required></textarea>

    <label>2. What is your current employment status?</label>
    <textarea name="Q2" required></textarea>

    <label>3. Describe your data entry experience.</label>
    <textarea name="Q3" required></textarea>

    <label>4. What is your typing speed (WPM)?</label>
    <input type="text" name="Typing Speed" required>

    <label>5. What tools/software have you used?</label>
    <textarea name="Q5" required></textarea>

    <label>6. Describe your remote work experience.</label>
    <textarea name="Q6" required></textarea>

    <label>7. How do you maintain accuracy?</label>
    <textarea name="Q7" required></textarea>

    <label>8. How do you verify your work?</label>
    <textarea name="Q8" required></textarea>

    <label>9. Describe a time you fixed an error.</label>
    <textarea name="Q9" required></textarea>

    <label>10. How do you manage deadlines?</label>
    <textarea name="Q10" required></textarea>

    <label>11. What do you do with unclear data?</label>
    <textarea name="Q11" required></textarea>

    <label>12. How do you handle confidential data?</label>
    <textarea name="Q12" required></textarea>

    <label>13. Your key strengths?</label>
    <textarea name="Q13" required></textarea>

    <label>14. Areas you are improving?</label>
    <textarea name="Q14" required></textarea>

    <label>15. Why do you want this role?</label>
    <textarea name="Q15" required></textarea>

    <button type="submit">Submit Interview</button>

  </form>

</div>

</body>
</html>
